<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お話の森 | mofinaproject</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/assets/mofina.ico">
</head>
<body>
  <main class="screen">
    <section class="panel">
      <div id="chatLog" class="chatLog"></div>
      <form id="chatForm" class="chatForm" onsubmit="return false;">
        <input id="chatInput" class="chatInput" type="text" placeholder="もふぃなに話しかけてね…" autocomplete="off">
        <button id="chatBtn" class="chatBtn" type="submit">送信</button>
      </form>
    </section>
  </main>

  <script>
    const log = document.getElementById("chatLog");
    const input = document.getElementById("chatInput");
    const form = document.getElementById("chatForm");

    let chatHistory = [];
    let lastActiveTime = Date.now();

    function add(role, text) {
      const row = document.createElement("div");
      row.className = "msg " + (role === "user" ? "user" : "bot");
      row.innerHTML = `<div class="bubble">${text}</div>`;
      log.appendChild(row);
      log.scrollTop = log.scrollHeight;
      return row;
    }

    form.addEventListener("submit", async () => {
      const msg = input.value.trim(); 
      if(!msg) return; 
      input.value = "";
      
      // 10分以上（600,000ミリ秒）経っていたら記憶を消すニャ
      const now = Date.now();
      if (now - lastActiveTime > 600000) {
        chatHistory = [];
        console.log("もふぃなは10分お休みしたので、前の話を忘れちゃったニャ🌿");
      }
      lastActiveTime = now;

      add("user", msg);
      const th = add("bot", "…考え中🍃");

      try {
        const res = await fetch("/api/chat", { 
          method: "POST", 
          headers: { "Content-Type": "application/json" },
          // ここが重要ニャ！シンプルにメッセージと履歴だけを送るニャ
          body: JSON.stringify({ message: msg, history: chatHistory })
        });
        
        const data = await res.json();
        const reply = data.reply;

        th.querySelector(".bubble").textContent = reply;
        
        chatHistory.push({ role: "user", parts: [{ text: msg }] });
        chatHistory.push({ role: "model", parts: [{ text: reply }] });

        log.scrollTop = log.scrollHeight;
      } catch(e) { 
        th.querySelector(".bubble").textContent = "エラーだニャ🌿"; 
      }
    });
  </script>
</body>
</html>
