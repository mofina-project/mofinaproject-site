<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta id="meta-desc" name="description" content="ミントリーフの森の入口。光るものを見つけてね。">
<title>Mofina Project | Forest Entrance</title>

<style>
:root{
--glow:254,235,112;
--text:rgba(255,255,255,.92);
--shadow:rgba(0,0,0,.45);
--panel:rgba(0,0,0,.28);
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}

body{
font-family:ui-sans-serif,system-ui,-apple-system,"Hiragino Sans","Noto Sans JP","Segoe UI",Arial,sans-serif;
background:#07150f;
color:var(--text);
overflow:hidden
}

.scene{
position:relative;
height:100%;
width:100%;
background:
radial-gradient(1200px 700px at 50% 35%,rgba(255,255,255,.10),rgba(0,0,0,0)55%),
linear-gradient(180deg,rgba(0,0,0,.0),rgba(0,0,0,.55))
}

.map{
position:absolute;
inset:0;
background-color:#0b2016;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
filter:saturate(1.03)contrast(1.02);
transform:scale(1.02);
opacity:0;
transition:opacity .45s ease
}

.map.is-visible{opacity:1}

.mist{
position:absolute;
inset:-10%;
background:radial-gradient(900px 500px at 50% 40%,rgba(255,255,255,.14),rgba(255,255,255,0)60%);
mix-blend-mode:screen;
pointer-events:none;
animation:mist 9s ease-in-out infinite alternate;
opacity:.65
}

@keyframes mist{
from{transform:translateY(0);opacity:.55}
to{transform:translateY(-10px);opacity:.72}
}

.ui{
position:absolute;
inset:0;
pointer-events:none;
opacity:0;
transition:opacity .35s ease
}

.ui.is-visible{opacity:1}

.hint{
position:absolute;
left:18px;
top:18px;
padding:10px 12px;
background:var(--panel);
border:1px solid rgba(255,255,255,.16);
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,.35);
backdrop-filter:blur(8px);
pointer-events:none;
max-width:78vw;
line-height:1.45;
font-size:14px;
opacity:0;
transform:translateY(-6px);
animation:hintIn 700ms ease-out 220ms forwards,hintOut 900ms ease-in 3.6s forwards
}

@keyframes hintIn{to{opacity:1;transform:translateY(0)}}
@keyframes hintOut{to{opacity:0;transform:translateY(-6px)}}

.lang{
position:absolute;
right:16px;
top:16px;
display:flex;
gap:8px;
align-items:center;
pointer-events:auto
}

.lang button{
border:1px solid rgba(255,255,255,.18);
background:rgba(0,0,0,.24);
color:var(--text);
padding:8px 10px;
border-radius:999px;
font-size:13px;
cursor:pointer;
backdrop-filter:blur(8px)
}

.portal{
position:absolute;
width:92px;
height:92px;
border-radius:999px;
pointer-events:auto;
cursor:pointer;
text-decoration:none;
display:grid;
place-items:center;
color:var(--text);
transform:translate(-50%,-50%);
z-index:3
}

.portal::before{
content:"";
position:absolute;
inset:-12px;
border-radius:inherit;
background:radial-gradient(circle at 50% 50%,rgba(var(--glow),.70)0%,rgba(var(--glow),.26)42%,rgba(var(--glow),0)74%);
filter:blur(1px);
animation:pulse 2.2s ease-in-out infinite;
mix-blend-mode:screen
}

.portal::after{
content:"";
position:absolute;
inset:-30px;
border-radius:inherit;
background:radial-gradient(circle at 50% 50%,rgba(var(--glow),.22)0%,rgba(var(--glow),.12)26%,rgba(var(--glow),0)70%);
animation:pulse2 3.6s ease-in-out infinite;
mix-blend-mode:screen
}

@keyframes pulse{
0%,100%{transform:scale(.98);opacity:.88}
50%{transform:scale(1.06);opacity:1}
}

@keyframes pulse2{
0%,100%{transform:scale(.98);opacity:.58}
50%{transform:scale(1.08);opacity:.78}
}

.icon{
position:relative;
width:54px;
height:54px;
border-radius:16px;
background:rgba(0,0,0,.20);
border:1px solid rgba(255,255,255,.14);
box-shadow:0 10px 28px rgba(0,0,0,.25);
display:grid;
place-items:center;
font-size:26px;
z-index:4
}

.label{
position:absolute;
top:100%;
margin-top:10px;
padding:6px 10px;
border-radius:999px;
background:rgba(0,0,0,.28);
border:1px solid rgba(255,255,255,.14);
font-size:12px;
white-space:nowrap
}

/* portal位置：左 -3px / 上 -3px */

#p-talk{
left:calc(47% - 3px);
top:calc(30% - 3px);
width:104px;
height:104px
}

#p-daily{
left:calc(25% - 3px);
top:calc(58% - 3px)
}

#p-book{
left:calc(76% - 3px);
top:calc(58% - 3px)
}

.footer-note{
position:absolute;
left:16px;
bottom:14px;
font-size:12px;
opacity:.78
}

/* loader */

.loader{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(900px 500px at 50% 35%,rgba(255,255,255,.06),rgba(255,255,255,0)60%),
linear-gradient(180deg,#203222,#0f1b13);
z-index:9999;
transition:opacity .45s ease
}

.loader.is-hidden{
opacity:0;
pointer-events:none
}

.loader-character{
width:150px;
display:block;
margin:0 auto 16px;
filter:drop-shadow(0 10px 14px rgba(0,0,0,.22))
}

.loader-text{
line-height:1.7;
font-size:19px;
font-weight:700;
text-align:center
}

@media (max-width:520px){

#p-daily{
left:calc(22% - 3px);
top:calc(62% - 3px)
}

#p-book{
left:calc(78% - 3px);
top:calc(62% - 3px)
}

.loader-character{width:128px}

}

@media (prefers-reduced-motion: reduce){
.mist,.portal::before,.portal::after{animation:none!important}
.hint{animation:none!important;opacity:1;transform:none}
}
</style>
</head>

<body>

<div class="loader" id="loader">
<div>
<img class="loader-character" src="/assets/mofina_2.png" alt="もふぃな">

<div class="loader-text" id="loader-text-ja">
えへへ、みんな～<br>
もふぃなだよ。<br>
<small>ミントリーフの森へようこそ 🌿</small>
</div>

<div class="loader-text" id="loader-text-en" style="display:none;">
Hehe, everyone~<br>
I'm Mofina.<br>
<small>Welcome to Mintleaf Forest 🌿</small>
</div>

</div>
</div>

<main class="scene">

<div class="map" id="map"></div>
<div class="mist"></div>

<div class="ui" id="ui">

<div class="hint" id="hint">
<span data-ja>光るものを見つけてね。</span>
<span data-en style="display:none;">Find something that glows.</span>
</div>

<div class="lang">
<button id="btn-ja" aria-pressed="true">JP</button>
<button id="btn-en" aria-pressed="false">EN</button>
</div>

<a class="portal" id="p-talk" href="/leaf/jp/">
<div class="icon">✨</div>
<div class="label">
<span data-ja>もふぃなとお話</span>
<span data-en style="display:none;">Talk with Mofina</span>
</div>
</a>

<a class="portal" id="p-daily" href="/story/">
<div class="icon">📜</div>
<div class="label">
<span data-ja>Story</span>
<span data-en style="display:none;">Story</span>
</div>
</a>

<a class="portal" id="p-book" href="/idobata/">
<div class="icon">☕</div>
<div class="label">
<span data-ja>井戸端会議</span>
<span data-en style="display:none;">Idobata</span>
</div>
</a>

<div class="footer-note">
<span data-ja>© Mofina Project</span>
<span data-en style="display:none;">© Mofina Project</span>
</div>

</div>
</main>

<script>

const map=document.getElementById("map")
const ui=document.getElementById("ui")
const loader=document.getElementById("loader")

const loaderTextJa=document.getElementById("loader-text-ja")
const loaderTextEn=document.getElementById("loader-text-en")

const btnJa=document.getElementById("btn-ja")
const btnEn=document.getElementById("btn-en")

function setLang(lang){

const ja=lang==="ja"

document.querySelectorAll("[data-ja]").forEach(el=>el.style.display=ja?"":"none")
document.querySelectorAll("[data-en]").forEach(el=>el.style.display=ja?"none":"")

loaderTextJa.style.display=ja?"":"none"
loaderTextEn.style.display=ja?"none":""

localStorage.setItem("mofina_lang",lang)

}

btnJa.onclick=()=>setLang("ja")
btnEn.onclick=()=>setLang("en")

const saved=localStorage.getItem("mofina_lang")
if(saved==="en")setLang("en")

const sameOriginReferrer=document.referrer&&(()=>{

try{
return new URL(document.referrer).origin===location.origin
}catch(e){return false}

})()

const hasVisited=sessionStorage.getItem("mofina_map1_visited")==="1"
const returning=hasVisited||sameOriginReferrer
const minLoaderTime=returning?700:1300

loaderTextJa.innerHTML=returning
?"次はどこへ行く？"
:"えへへ、みんな～<br>もふぃなだよ。<br><small>ミントリーフの森へようこそ 🌿</small>"

loaderTextEn.innerHTML=returning
?"Where shall we go next?"
:"Hehe, everyone~<br>I'm Mofina.<br><small>Welcome to Mintleaf Forest 🌿</small>"

function preloadImage(src){
return new Promise((resolve,reject)=>{
const img=new Image()
img.onload=()=>resolve(src)
img.onerror=()=>reject(src)
img.src=src+"?v="+Date.now()
})
}

async function loadMapImage(){

const candidates=[
"/assets/forest-map.webp",
"asssets/forest-map.webp"
]

for(const src of candidates){

try{
const ok=await preloadImage(src)
map.style.backgroundImage=`url("${ok}")`
return
}catch(e){}

}

}

async function boot(){

const start=performance.now()

await loadMapImage()

const elapsed=performance.now()-start
const wait=Math.max(0,minLoaderTime-elapsed)

await new Promise(r=>setTimeout(r,wait))

loader.classList.add("is-hidden")
map.classList.add("is-visible")
ui.classList.add("is-visible")

sessionStorage.setItem("mofina_map1_visited","1")

}

boot()

const talk=document.getElementById("p-talk")
let poke=0

talk.addEventListener("click",(e)=>{

const now=Date.now()

if(!talk._t)talk._t=now

if(now-talk._t<450){

poke++

if(poke===2){

const hint=document.getElementById("hint")

hint.style.opacity="1"
hint.style.transform="translateY(0)"

hint.innerHTML=document.documentElement.lang==="ja"
?"くすぐったい。"
:"That tickles."

setTimeout(()=>location.href=talk.href,180)

e.preventDefault()
poke=0

}

}else poke=0

talk._t=now

})

</script>

</body>
</html>
