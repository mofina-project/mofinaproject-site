<!doctype html>
<html lang="ja">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mofina Project</title>

<style>

html,body{
margin:0;
padding:0;
height:100%;
font-family:sans-serif;
background:#0b1d14;
overflow:hidden;
}

/* ===== MAP ===== */

.map{
position:absolute;
width:100%;
height:100%;
background:url("/assets/forest-map.webp") center/cover no-repeat;
opacity:0;
transition:opacity .5s;
}

.map.show{
opacity:1;
}

/* ===== LOADER ===== */

.loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
background:#15291e;
z-index:9999;
transition:opacity .5s;
}

.loader.hide{
opacity:0;
pointer-events:none;
}

.loader img{
width:150px;
position:absolute;
opacity:0;
}

.loader img.active{
opacity:1;
}

.loader-text{
margin-top:180px;
color:white;
font-size:20px;
text-align:center;
line-height:1.6;
}

</style>
</head>

<body>

<!-- Loader -->

<div class="loader" id="loader">

<div style="position:relative;height:160px">

<img id="frame1" class="active" src="/assets/mofina_1.png">
<img id="frame2" src="/assets/mofina_2.png">
<img id="frame3" src="/assets/mofina_3.png">

</div>

<div class="loader-text">

えへへ、みんな～<br>
もふぃなだよ。<br>
ミントリーフの森へようこそ 🌿

</div>

</div>


<!-- Map -->

<div class="map" id="map"></div>


<script>

/* ===== もふぃなアニメ ===== */

const frames = [
document.getElementById("frame1"),
document.getElementById("frame2"),
document.getElementById("frame3")
]

let index = 0

setInterval(()=>{

frames[index].classList.remove("active")

index = (index+1)%3

frames[index].classList.add("active")

},350)



/* ===== Map読み込み ===== */

const loader = document.getElementById("loader")
const map = document.getElementById("map")

const img = new Image()

img.src="/assets/forest-map.webp"

img.onload=()=>{

setTimeout(()=>{

loader.classList.add("hide")

map.classList.add("show")

},1500)

}

</script>


</body>
</html>
