<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Story | Mofina Project</title>
<meta name="description" content="もふぃなのお話一覧">
<style>
body{
  margin:0;
  font-family:ui-sans-serif,system-ui,-apple-system,"Hiragino Sans","Noto Sans JP","Segoe UI",Arial,sans-serif;
  background:#f6fbf7;
  color:#203224;
}
.wrap{
  max-width:920px;
  margin:0 auto;
  padding:32px 16px 64px;
}
h1{
  margin:0 0 8px;
  font-size:32px;
}
.lead{
  margin:0 0 24px;
  color:#4b6254;
  line-height:1.7;
}
.nav{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin:0 0 24px;
}
.nav a{
  text-decoration:none;
  color:#2f5d43;
  background:#e9f4ec;
  border:1px solid #cfe3d5;
  padding:8px 12px;
  border-radius:999px;
}
.list{
  display:grid;
  gap:16px;
}
.card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:#fff;
  border:1px solid #dbe9de;
  border-radius:16px;
  padding:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.04);
}
.card:hover{
  transform:translateY(-1px);
}
.meta{
  font-size:13px;
  color:#6a7f70;
  margin-bottom:8px;
}
.card h2{
  margin:0 0 10px;
  font-size:22px;
}
.summary{
  color:#425447;
  line-height:1.7;
}
.footer{
  margin-top:32px;
  font-size:12px;
  color:#6a7f70;
}
</style>
</head>
<body>
<main class="wrap">
  <nav class="nav">
    <a href="/">森の入口</a>
    <a href="/idobata/">井戸端会議</a>
  </nav>

  <h1>Story</h1>
  <p class="lead">もふぃなのお話を読める場所にゃ。</p>

  <div id="story-list" class="list"></div>

  <div class="footer">© Mofina Project</div>
</main>

<script>
function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

const list = document.getElementById("story-list");

if (!list) {
  console.error("story-list が見つからないにゃ");
} else {
  fetch("./story.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }
    return res.json();
  })
  .then(data => {
    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div class="card"><h2>まだお話がないにゃ</h2><div class="summary">story.json は読めたけれど、記事データが空だったにゃ。</div></div>';
      return;
    }

    data.forEach(post => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = post.url;

      a.innerHTML = `
        <div class="meta">${escapeHTML(post.date || "")}</div>
        <h2>${escapeHTML(post.title || "")}</h2>
        <div class="summary">${escapeHTML(post.description || "")}</div>
      `;

      list.appendChild(a);
    });
  })
  .catch(err => {
    list.innerHTML =
      '<div class="card"><h2>まだお話が見つからないにゃ</h2><div class="summary">story.json の取得に失敗したにゃ。原因: ' +
      escapeHTML(String(err.message || err)) +
      '</div></div>';
    console.error(err);
  });
}
</script>
</body>
</html>
