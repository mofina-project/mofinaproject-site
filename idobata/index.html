<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="もふぃなの番外編。動画のお話をひろう、小さな森のStoryにゃ。">
<title>Idobata | Mofina Project</title>

<style>
:root{
--text:rgba(255,255,255,.92);
--panel:rgba(0,0,0,.28);
--line:rgba(255,255,255,.14);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
font-family:ui-sans-serif,system-ui,-apple-system,"Hiragino Sans","Noto Sans JP","Segoe UI",Arial,sans-serif;
background:#0b2016;
color:var(--text);
line-height:1.8;
}

.page{
min-height:100vh;
padding:32px 20px 60px;
background:
radial-gradient(1000px 600px at 50% 20%,rgba(255,255,255,.08),rgba(255,255,255,0)60%),
linear-gradient(180deg,rgba(0,0,0,.06),rgba(0,0,0,.30));
}

.wrap{
max-width:980px;
margin:0 auto;
}

.header{
margin-bottom:28px;
padding:20px 18px;
border:1px solid var(--line);
border-radius:18px;
background:var(--panel);
backdrop-filter:blur(8px);
}

.header h1{
margin:0 0 10px;
font-size:30px;
line-height:1.3;
}

.header p{
margin:0;
font-size:14px;
opacity:.92;
}

.nav{
margin-top:14px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.nav a{
display:inline-block;
padding:8px 12px;
border-radius:999px;
text-decoration:none;
color:var(--text);
background:rgba(0,0,0,.24);
border:1px solid var(--line);
font-size:13px;
}

.list{
display:grid;
gap:16px;
}

.card{
display:block;
text-decoration:none;
color:var(--text);
padding:18px;
border-radius:18px;
border:1px solid var(--line);
background:rgba(0,0,0,.22);
box-shadow:0 10px 24px rgba(0,0,0,.20);
transition:transform .18s ease,background .18s ease,border-color .18s ease;
}

.card:hover{
transform:translateY(-2px);
background:rgba(0,0,0,.28);
border-color:rgba(255,255,255,.22);
}

.card h2{
margin:0 0 8px;
font-size:20px;
line-height:1.4;
}

.meta{
font-size:12px;
opacity:.72;
margin-bottom:8px;
}

.summary{
font-size:14px;
opacity:.92;
}

.footer{
margin-top:28px;
font-size:12px;
opacity:.75;
}

@media (max-width:640px){
.page{padding:20px 14px 50px}
.header h1{font-size:26px}
.card h2{font-size:18px}
}
</style>
</head>
<body>
<div class="page">
<div class="wrap">

<header class="header">
<h1>井戸端会議</h1>
<p>もふぃなの日常や、動画の裏側をひろう小さな森のお話にゃ。</p>
<div class="nav">
<a href="/">Forest Entrance</a>
<a href="/story/">Story</a>
</div>
</header>

<main class="list" id="story-list"></main>

<div class="footer">© Mofina Project</div>

</div>
</div>

<script>
fetch("/idobata/idobata.json")
.then(res=>res.json())
.then(data=>{
const list=document.getElementById("story-list")

data.forEach(post=>{
const a=document.createElement("a")
a.className="card"
a.href=post.url
a.innerHTML=`
<div class="meta">${post.date || ""}</div>
<h2>${post.title || ""}</h2>
<div class="summary">${post.description || ""}</div>
`
list.appendChild(a)
})
})
.catch(()=>{
document.getElementById("story-list").innerHTML='<div class="card"><h2>まだお話が見つからないにゃ</h2><div class="summary">idobata.json を確認してにゃ。</div></div>'
})
</script>
</body>
</html>
