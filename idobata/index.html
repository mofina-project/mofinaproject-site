<script>
function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

// IDが HTML側と一致しているか確認してください
const list = document.getElementById("story-list"); 

if (!list) {
  console.error("リスト表示用の要素が見つからないにゃ");
} else {
  // ★ここを idobata.json に変更
  fetch("./idobata.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP " + res.status + " (idobata.json が見つからないにゃ)");
    }
    return res.json();
  })
  .then(data => {
    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div class="card"><h2>まだ投稿がないにゃ</h2><div class="summary">idobata.json は読めたけれど、中身が空だったにゃ。</div></div>';
      return;
    }

    data.forEach(post => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = post.url;

      a.innerHTML = `
        <div class="meta">${escapeHTML(post.date || "")}</div>
        <h2>${escapeHTML(post.title || "")}</h2>
        <div class="summary">${escapeHTML(post.description || "")}</div>
      `;

      list.appendChild(a);
    });
  })
  .catch(err => {
    list.innerHTML =
      '<div class="card"><h2>一覧が読み込めないにゃ</h2><div class="summary">データの取得に失敗したにゃ。原因: ' +
      escapeHTML(String(err.message || err)) +
      '</div></div>';
    console.error(err);
  });
}
</script>
