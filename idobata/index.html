<script>

function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

fetch("/idobata/idobata.json")
.then(res=>res.json())
.then(data=>{
const list=document.getElementById("idobata-list")

data.forEach(post=>{
const a=document.createElement("a")
a.className="card"
a.href=post.url
a.innerHTML=`
<div class="meta">${escapeHTML(post.date || "")}</div>
<h2>${escapeHTML(post.title || "")}</h2>
<div class="summary">${escapeHTML(post.description || "")}</div>
`
list.appendChild(a)
})
})
.catch(()=>{
document.getElementById("idobata-list").innerHTML='<div class="card"><h2>まだお話が見つからないにゃ</h2><div class="summary">idobata.json を確認してにゃ。</div></div>'
})
</script>
