<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Idobata | Mofina Project</title>
<meta name="description" content="もふぃなの井戸端会議">
<style>
body{
  margin:0;
  font-family:ui-sans-serif,system-ui,-apple-system,"Hiragino Sans","Noto Sans JP","Segoe UI",Arial,sans-serif;
  background:#f6fbf7;
  color:#203224;
}
.wrap{
  max-width:920px;
  margin:0 auto;
  padding:32px 16px 64px;
}
h1{
  margin:0 0 8px;
  font-size:32px;
}
.lead{
  margin:0 0 24px;
  color:#4b6254;
  line-height:1.7;
}
.nav{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin:0 0 24px;
}
.nav a{
  text-decoration:none;
  color:#2f5d43;
  background:#e9f4ec;
  border:1px solid #cfe3d5;
  padding:8px 12px;
  border-radius:999px;
}

.hero{
  position:relative;
  overflow:hidden;
  border-radius:24px;
  margin:0 0 28px;
  border:1px solid #dbe9de;
  box-shadow:0 8px 24px rgba(0,0,0,.06);
  background:#eaf4ec;
}
.hero img{
  display:block;
  width:100%;
  aspect-ratio:16 / 9;
  object-fit:cover;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top, rgba(20,35,24,.52) 0%, rgba(20,35,24,.22) 36%, rgba(20,35,24,0) 62%),
    linear-gradient(to right, rgba(20,35,24,.20) 0%, rgba(20,35,24,0) 42%);
  pointer-events:none;
}
.hero-copy{
  position:absolute;
  left:24px;
  bottom:22px;
  z-index:1;
  color:#fffdf7;
  text-shadow:0 2px 10px rgba(0,0,0,.25);
}
.hero-copy .line1{
  display:block;
  font-size:14px;
  letter-spacing:.08em;
  margin-bottom:8px;
  opacity:.95;
}
.hero-copy .line2{
  display:block;
  font-size:30px;
  font-weight:700;
  line-height:1.25;
  margin-bottom:6px;
}
.hero-copy .line3{
  display:block;
  font-size:16px;
  line-height:1.6;
  opacity:.98;
}
.hero-copy .line4{
  display:block;
  font-size:16px;
  line-height:1.6;
  opacity:.98;
}

.list{
  display:grid;
  gap:16px;
}
.card{
  display:block;
  text-decoration:none;
  color:inherit;
  background:#fff;
  border:1px solid #dbe9de;
  border-radius:16px;
  padding:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.04);
}
.card:hover{
  transform:translateY(-1px);
}
.meta{
  font-size:13px;
  color:#6a7f70;
  margin-bottom:8px;
}
.card h2{
  margin:0 0 10px;
  font-size:22px;
}
.summary{
  color:#425447;
  line-height:1.7;
}
.footer{
  margin-top:32px;
  font-size:12px;
  color:#6a7f70;
}

@media (max-width:640px){
  .hero{
    border-radius:18px;
    margin:0 0 24px;
  }
  .hero img{
    aspect-ratio:4 / 5;
  }
  .hero-copy{
    left:16px;
    right:16px;
    bottom:16px;
  }
  .hero-copy .line1{
    font-size:12px;
    margin-bottom:6px;
  }
  .hero-copy .line2{
    font-size:23px;
  }
  .hero-copy .line3,
  .hero-copy .line4{
    font-size:14px;
    line-height:1.5;
  }
}
</style>
</head>
<body>
<main class="wrap">
  <nav class="nav">
    <a href="/">森の入口</a>
    <a href="/story/">Story</a>
  </nav>

  <h1>Idobata</h1>
  <p class="lead">もふぃなの井戸端会議にゃ。</p>

  <section class="hero" aria-label="Idobata の挿入画">
    <img src="/images/idobata/idobata_cover.png?v=1">
    <div class="hero-copy">
      <span class="line1">Idobata</span>
      <span class="line2">森の奥で、そっと交わされる話</span>
      <span class="line3">ここには、少しだけ</span>
      <span class="line4">深い言葉が落ちています。</span>
    </div>
  </section>

  <div id="idobata-list" class="list"></div>

  <div class="footer">© Mofina Project</div>
</main>

<script>
function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

const list = document.getElementById("idobata-list");

if (!list) {
  console.error("idobata-list が見つからないにゃ");
} else {
  fetch("./idobata.json")
  .then(res => {
    if (!res.ok) {
      throw new Error("HTTP " + res.status);
    }
    return res.json();
  })
  .then(data => {
    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = '<div class="card"><h2>まだお話がないにゃ</h2><div class="summary">idobata.json は読めたけれど、記事データが空だったにゃ。</div></div>';
      return;
    }

    data.forEach(post => {
      const a = document.createElement("a");
      a.className = "card";
      a.href = post.url;

      a.innerHTML = `
        <div class="meta">${escapeHTML(post.date || "")}</div>
        <h2>${escapeHTML(post.title || "")}</h2>
        <div class="summary">${escapeHTML(post.description || "")}</div>
      `;

      list.appendChild(a);
    });
  })
  .catch(err => {
    list.innerHTML =
      '<div class="card"><h2>まだお話が見つからないにゃ</h2><div class="summary">idobata.json の取得に失敗したにゃ。原因: ' +
      escapeHTML(String(err.message || err)) +
      '</div></div>';
    console.error(err);
  });
}
</script>
</body>
</html>
